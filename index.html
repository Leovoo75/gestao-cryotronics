<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cryotronics Cloud - ERP 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        header { background: #0b2b40; color: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .tab-btn { background: #fff; border: 1px solid #ddd; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: #0b2b40; color: white; border-color: #0b2b40; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; align-items: end; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 0.95rem; }
        button { background: #0b2b40; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #154563; }
        .summary-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .summary-item { background: white; padding: 20px; border-radius: 15px; text-align: center; border-left: 5px solid #0b2b40; }
        .summary-value { font-size: 1.5rem; font-weight: bold; display: block; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 0.85rem; text-transform: uppercase; color: #666; }
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b2b40; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; }
        .negativo { color: #e74c3c; }
        .positivo { color: #27ae60; }
    </style>
</head>
<body>

<div id="authOverlay">
    <i class="fas fa-lock fa-3x" style="margin-bottom: 20px;"></i>
    <h2>Cryotronics ERP 2026</h2>
    <input type="password" id="pinInput" placeholder="PIN de Acesso" style="width:250px; margin:20px; text-align:center;">
    <button onclick="login()" style="width:250px;">Acessar Sistema</button>
</div>

<div class="container">
    <header>
        <h1><i class="fas fa-microchip"></i> Cryotronics Cloud</h1>
        <p>Sistema Unificado de Gestão Financeira</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-home"></i> Dashboard</button>
        <button class="tab-btn" data-tab="entry"><i class="fas fa-plus-circle"></i> Novo Lançamento</button>
        <button class="tab-btn" data-tab="history"><i class="fas fa-list"></i> Extrato</button>
        <button class="tab-btn" data-tab="dre"><i class="fas fa-file-invoice-dollar"></i> DRE</button>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="summary-box" id="summaryBox"></div>
        <div class="card">
            <h3>Distribuição de Custos (Plano de Contas)</h3>
            <canvas id="mainChart" height="100"></canvas>
        </div>
    </div>

    <div id="entry" class="tab-content">
        <div class="card">
            <h3>Registrar Movimentação</h3>
            <div class="form-row">
                <div><label>Data</label><input type="date" id="txDate"></div>
                <div><label>Descrição</label><input type="text" id="txDesc" placeholder="Ex: Manutenção Chiller X"></div>
                <div><label>Categoria (Plano de Contas)</label><select id="txAccount"></select></div>
                <div><label>Valor R$</label><input type="number" step="0.01" id="txValue"></div>
                <div><button onclick="saveTransaction()"><i class="fas fa-save"></i> Salvar</button></div>
            </div>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="card" style="overflow-x:auto;">
            <table id="txTable">
                <thead><tr><th>Data</th><th>Descrição</th><th>Conta</th><th>Valor</th><th>Ações</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="dre" class="tab-content">
        <div class="card">
            <div class="form-row">
                <div><label>Período</label><input type="month" id="dreMonth"></div>
                <div><button onclick="generateDRE()"><i class="fas fa-sync"></i> Calcular DRE</button></div>
            </div>
            <div id="dreDisplay" style="margin-top:25px;"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyByKC9bZlxKORGveQYcNtEjox5ewxrwH2c",
        authDomain: "cryoges.firebaseapp.com",
        databaseURL: "https://cryoges-default-rtdb.firebaseio.com",
        projectId: "cryoges",
        storageBucket: "cryoges.firebasestorage.app",
        messagingSenderId: "272383154652",
        appId: "1:272383154652:web:9bd1ebd415243f22b39719"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // MAPA DO PLANO DE CONTAS 2026 (BASEADO NO SEU CSV)
    const PLANO_DE_CONTAS = [
        { code: "1.1", name: "Receita de Serviços (Manutenção/Projetos)", type: "receita" },
        { code: "1.2", name: "Receita de Venda de Equipamentos", type: "receita" },
        { code: "2.1", name: "Impostos sobre Vendas", type: "deducao" },
        { code: "3.1.1", name: "Compra de Peças / Materiais", type: "custo_variavel" },
        { code: "3.1.2", name: "Mão de Obra Terceirizada", type: "custo_variavel" },
        { code: "3.1.3", name: "Fretes e Transportes", type: "custo_variavel" },
        { code: "3.2.1", name: "Aluguel e Infraestrutura Oficina", type: "custo_fixo" },
        { code: "3.2.2.02", name: "Despesas com Viagens", type: "despesa" },
        { code: "3.2.2.03", name: "Honorários Contabilidade", type: "despesa" },
        { code: "3.2.2.09", name: "Marketing e Comercial", type: "despesa" }
    ];

    let allTransactions = {};

    function login() {
        if(document.getElementById("pinInput").value === "1234") {
            document.getElementById("authOverlay").style.display = "none";
        } else { alert("Senha incorreta"); }
    }

    // Inicializar Categorias
    function initCategories() {
        const select = document.getElementById("txAccount");
        select.innerHTML = PLANO_DE_CONTAS.map((acc, index) => 
            `<option value="${index}">${acc.code} - ${acc.name}</option>`
        ).join('');
    }

    // Ouvir Banco de Dados
    db.ref('transactions').on('value', (snapshot) => {
        allTransactions = snapshot.val() || {};
        renderUI();
    });

    function saveTransaction() {
        const date = document.getElementById("txDate").value;
        const desc = document.getElementById("txDesc").value;
        const accIdx = document.getElementById("txAccount").value;
        const val = parseFloat(document.getElementById("txValue").value);

        if(!date || !desc || isNaN(val)) return alert("Preencha todos os campos");

        const category = PLANO_DE_CONTAS[accIdx];
        db.ref('transactions').push({
            date, description: desc, 
            code: category.code, category: category.name, 
            type: category.type, value: val
        });

        alert("Lançamento realizado!");
        document.getElementById("txDesc").value = "";
        document.getElementById("txValue").value = "";
    }

    function renderUI() {
        const txList = Object.entries(allTransactions).map(([id, data]) => ({id, ...data}));
        txList.sort((a,b) => b.date.localeCompare(a.date));

        // Tabela Extrato
        const tbody = document.querySelector("#txTable tbody");
        tbody.innerHTML = txList.slice(0, 30).map(t => `
            <tr>
                <td>${t.date.split('-').reverse().join('/')}</td>
                <td>${t.description}</td>
                <td><small>${t.code}</small> ${t.category}</td>
                <td class="${t.type === 'receita' ? 'positivo' : 'negativo'}">R$ ${t.value.toFixed(2)}</td>
                <td><button onclick="deleteTx('${t.id}')" style="background:red; padding:5px 10px;"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');

        // Dashboard
        let ent = 0, sai = 0;
        txList.forEach(t => {
            if(t.type === 'receita') ent += t.value;
            else sai += t.value;
        });

        document.getElementById("summaryBox").innerHTML = `
            <div class="summary-item">Receita Bruta<span class="summary-value positivo">R$ ${ent.toFixed(2)}</span></div>
            <div class="summary-item">Saídas Totais<span class="summary-value negativo">R$ ${sai.toFixed(2)}</span></div>
            <div class="summary-item">Saldo em Conta<span class="summary-value ${ent-sai >=0 ? 'positivo':'negativo'}">R$ ${(ent-sai).toFixed(2)}</span></div>
        `;
    }

    function deleteTx(id) {
        if(confirm("Excluir este lançamento?")) db.ref(`transactions/${id}`).remove();
    }

    function generateDRE() {
        const month = document.getElementById("dreMonth").value;
        if(!month) return alert("Escolha o mês");

        const period = Object.values(allTransactions).filter(t => t.date.startsWith(month));
        
        let dre = { rec: 0, ded: 0, cv: 0, cf: 0, desp: 0 };
        period.forEach(t => {
            if(t.type === 'receita') dre.rec += t.value;
            else if(t.type === 'deducao') dre.ded += t.value;
            else if(t.type === 'custo_variavel') dre.cv += t.value;
            else if(t.type === 'custo_fixo') dre.cf += t.value;
            else dre.desp += t.value;
        });

        document.getElementById("dreDisplay").innerHTML = `
            <table style="font-size:1.1rem">
                <tr><td><b>(A) Receita Bruta</b></td><td align="right">R$ ${dre.rec.toFixed(2)}</td></tr>
                <tr class="negativo"><td>(-) Impostos e Deduções</td><td align="right">R$ ${dre.ded.toFixed(2)}</td></tr>
                <tr style="background:#eee"><td><b>(=) Receita Líquida</b></td><td align="right"><b>R$ ${(dre.rec - dre.ded).toFixed(2)}</b></td></tr>
                <tr class="negativo"><td>(-) Custos Variáveis (Peças/Terceiros)</td><td align="right">R$ ${dre.cv.toFixed(2)}</td></tr>
                <tr style="background:#eee"><td><b>(=) Margem de Contribuição</b></td><td align="right"><b>R$ ${(dre.rec - dre.ded - dre.cv).toFixed(2)}</b></td></tr>
                <tr class="negativo"><td>(-) Custos Fixos e Despesas</td><td align="right">R$ ${(dre.cf + dre.desp).toFixed(2)}</td></tr>
                <tr style="background:#0b2b40; color:white;"><td><b>(=) LUCRO / PREJUÍZO LÍQUIDO</b></td><td align="right"><b>R$ ${(dre.rec - dre.ded - dre.cv - dre.cf - dre.desp).toFixed(2)}</b></td></tr>
            </table>
        `;
    }

    // Alternar Tabs
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".tab-btn, .tab-content").forEach(el => el.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById(btn.dataset.tab).classList.add("active");
        }
    });

    window.onload = () => { 
        initCategories(); 
        document.getElementById("txDate").valueAsDate = new Date();
        document.getElementById("dreMonth").value = new Date().toISOString().slice(0,7);
    };
</script>
</body>
</html>
